<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trabalho XP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #F8F5F2;
        }
        </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="col-md-4">
            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Login</h3>

                <form onsubmit="validarLogin(event)">
                    
                    <div class="mb-3">
                        <label class="form-label">Login</label>
                        <input type="text" id="login" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger">Entrar</button>
                    </div>

                    <p id="erro" class="text-danger mt-3 text-center"></p>

                </form>

            </div>
        </div>

    </div>

    <script>
        function validarLogin(event) {
            event.preventDefault();

            const login = document.getElementById("login").value.trim();
            const senha = document.getElementById("senha").value.trim();
            const erro = document.getElementById("erro");

            const usuarioAdmin = "admin";
            const senhaAdmin = "123";

            const usuarioCliente = "cliente";
            const senhaCliente = "123";

            if (login === "" || senha === "") {
                erro.innerText = "Preencha todos os campos!";
                return;
            }

            if (login === usuarioAdmin && senha === senhaAdmin) {
                window.location.href = "adm.html";
            }else if (login === usuarioCliente && senha === senhaCliente) {
                window.location.href = "cliente.html";
            }else {
                erro.innerText = "Login ou senha inválidos!";
            }
        }
    </script>

</body>
</html>
