<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho - XP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #F8F5F2;
        }

        h1 {
            color: #2C2C2C;
        }

        .card-custom {
            border-top: 5px solid #F4B400;
            border-radius: 12px;
            transition: 0.3s;
        }

            .card img {
                width: 100%;
                max-height: 150px;
                object-fit: contain;
            }

        .card-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body> 
    <div class="container py-4">

        <h1 class="text-center mb-4">Cardápio</h1>

        <div class="mb-4">
            <input type="text" id="nome" placeholder="Produto" class="form-control mb-2">
            <input type="text" id="descricao" placeholder="Descrição" class="form-control mb-2">
            <input type="number" id="valor" placeholder="Valor (R$)" class="form-control mb-2">
            <!--<input type="text" id="imagem" placeholder="Imagem (ex: McD.png)" class="form-control mb-2">-->
            <select name="time" id="imagem">
            <option value="Lanche.png">Lanche</option>
            <option value="PratoDeComida.jpg">Prato de comida</option>
            <option value="Bebida.png">Bebida</option>
            <option value="Sorvete.png">Sobremesa</option>
            </select>
            <button id="btnAdicionar" onclick="adicionar()" class="btn btn-danger">Adicionar</button>
        </div>

        <div class="row justify-content-center" id="cards"></div>

    </div>
    
    <script>
        let lista = [];
        let editandoIndex = -1;

        function adicionar() {
            const nome = document.getElementById("nome").value;
            const descricao = document.getElementById("descricao").value;
            const imagem = document.getElementById("imagem").value;
            const valor = document.getElementById("valor").value;
            console.log(imagem);

            if (nome === "" || descricao === "" || valor === "") {
                    alert("Preencha todos os campos!");
                    return;
                }

            if (editandoIndex === -1) {
                lista.push({ nome, descricao, imagem, valor });
            } else {
                lista[editandoIndex] = { nome, descricao, imagem, valor };
                editandoIndex = -1;
                document.getElementById("btnAdicionar").innerText = "Adicionar";
            }

            limparCampos();
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById("cards");
            container.innerHTML = "";

            lista.forEach((item, index) => {
                container.innerHTML += `
                <div class="col-md-3 mb-4">
                    <div class="card card-custom shadow">
                        <img src="img/${item.imagem}" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">${item.nome}</h5>
                            <p class="card-text">${item.descricao}</p>
                            <p class="card-text"><strong>R$ ${item.valor}</strong></p>

                            <button class="btn btn-primary btn-sm" onclick="editar(${index})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="remover(${index})">Remover</button>
                            
                        </div>
                    </div>
                </div>
                `;
            });
        }

        function remover(index) {
            lista.splice(index, 1);
            renderizar();
        }

        function editar(index) {
            document.getElementById("nome").value = lista[index].nome;
            document.getElementById("descricao").value = lista[index].descricao;
            document.getElementById("imagem").value = lista[index].imagem;
            document.getElementById("valor").value = lista[index].valor;

            editandoIndex = index;
            document.getElementById("btnAdicionar").innerText = "Salvar edição";
        }

        function limparCampos() {
            document.getElementById("nome").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("valor").value = "";
        }
</script>
</body>
</html>
