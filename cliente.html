<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho - XP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #F8F5F2;
        }

        h1 {
            color: #2C2C2C;
        }

        .card-custom {
            border-top: 5px solid #F4B400;
            border-radius: 12px;
            transition: 0.3s;
        }

            .card img {
                width: 100%;
                max-height: 150px;
                object-fit: contain;
            }

        .card-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body> 
    <div class="container py-4">

        <h1 class="text-center mb-4">Cardápio</h1>

        <div class="row justify-content-center" id="cards">

            <div class="col-md-3 mb-4">
                    <div class="card card-custom shadow">
                        <img src="img/Bebida.png" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Coca-Cola</h5>
                            <p class="card-text">Refrigerante</p>
                            <p class="card-text"><strong>R$15</strong></p>

                            <button class="btn btn-primary btn-sm">Selecionar</button>
                            
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card card-custom shadow">
                        <img src="img/Lanche.png" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Mc Donalds</h5>
                            <p class="card-text">Lanche</p>
                            <p class="card-text"><strong>R$20</strong></p>

                            <button class="btn btn-primary btn-sm">Selecionar</button>
                            
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card card-custom shadow">
                        <img src="img/PratoDeComida.jpg" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Prato Feito</h5>
                            <p class="card-text">Comida</p>
                            <p class="card-text"><strong>R$35</strong></p>

                            <button class="btn btn-primary btn-sm">Selecionar</button>
                            
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-4">
                    <div class="card card-custom shadow">
                        <img src="img/Sorvete.png" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Sorvete</h5>
                            <p class="card-text">Sobremesa</p>
                            <p class="card-text"><strong>R$5</strong></p>

                            <button class="btn btn-primary btn-sm">Selecionar</button>
                            
                        </div>
                    </div>
                </div>

        </div>

    </div>
    
</body>
</html>
